<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A1628" />
  <meta name="description" content="Tableau de bord administrateur Delfosse Properties" data-i18n-attr="content" data-i18n-attr-key="admin.meta" />
  <title data-i18n="admin.title.page">Administration — Delfosse Properties</title>

  <!-- Polices du site -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- CSS global du site : pour partager fonts + variables + classes .eyebrow, .cf-title, .brand-word, etc. -->
  <link rel="stylesheet" href="css/style.css?v=dc" />

  <style>
    /* ============================================================
       ADMIN DASHBOARD — même ambiance que la section "Réserver sur
       Airbnb" de la home : fond navy profond, titres en Cormorant
       italique, filets et numérotation or, lede en Jost clair.
       Grille éditoriale (non coverflow 3D : on veut VOIR les 7
       appartements d'un seul coup d'œil).
       ============================================================ */
    body.admin-page{
      background:#0A1628;
      color:#F5EDE0;
      min-height:100vh;
      min-height:100dvh;
    }
    /* Vignette ambiance discrète en bord */
    body.admin-page::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at center, transparent 40%, rgba(10,22,40,.92) 98%);
    }

    .admin-shell{
      position:relative;z-index:1;
      max-width:var(--container);
      margin:0 auto;
      padding:clamp(56px,8vw,100px) var(--gutter) clamp(72px,10vw,120px);
    }

    /* Header : brand + switcher éventuel */
    .admin-topbar{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:clamp(56px,7vw,96px);
    }
    .admin-topbar .brand-word{color:#F5EDE0}
    .admin-topbar .brand-word .brand-mono{color:#F5EDE0}
    .admin-topbar .brand-word .brand-sub{color:#D4B77E}

    .admin-foot-btn{
      background:transparent;border:1px solid rgba(201,169,97,.45);
      color:#F5EDE0;font-family:var(--f-sans);
      font-size:11px;letter-spacing:.28em;text-transform:uppercase;
      padding:12px 22px;border-radius:var(--radius-xs);
      cursor:pointer;transition:all .24s var(--ease-out);
    }
    .admin-foot-btn:hover{background:#B69368;border-color:#B69368;color:#0A1628}

    /* Switcher de langue sur fond navy */
    .admin-topbar .lang-switch{color:rgba(245,237,224,.55)}
    .admin-topbar .lang-switch button{color:inherit;opacity:.7}
    .admin-topbar .lang-switch button:hover{color:#F5EDE0;opacity:1}
    .admin-topbar .lang-switch button.is-active{color:#D4B77E;opacity:1}

    /* Bandeau d'intro : eyebrow + titre + lede (style homogène avec .cf-head) */
    .admin-head{
      max-width:820px;
      margin-bottom:clamp(48px,6vw,80px);
    }
    .admin-head .eyebrow{
      color:rgba(245,237,224,.72);
      margin-bottom:var(--s-2);
    }
    .admin-head .eyebrow::before{background:#C9A961}
    .admin-head .eyebrow-num{color:#D4B77E}
    .admin-title{
      font-family:var(--f-serif);font-weight:300;
      font-size:clamp(40px,6vw,88px);line-height:1.04;letter-spacing:-.02em;
      color:#F5EDE0;margin:0 0 var(--s-3);max-width:18ch;
    }
    .admin-title em{font-style:italic;font-weight:400;color:#D4B77E}
    .admin-lede{
      font-family:var(--f-sans);font-size:clamp(15px,1.4vw,17px);
      color:rgba(245,237,224,.68);max-width:54ch;
      line-height:1.65;margin:0;
    }

    /* Grille éditoriale d'appartements */
    .admin-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
      gap:clamp(20px,2.4vw,32px);
      margin-bottom:clamp(64px,8vw,96px);
    }

    /* Carte : reprend l'ADN de .cf-card (même BG, même coins, même vignette)
       mais en statique / rectangulaire / lisible, adapté à un dashboard. */
    .admin-card{
      position:relative;
      background:#0d1b30;
      border:1px solid rgba(245,237,224,.12);
      border-radius:var(--radius-xs);
      overflow:hidden;
      cursor:pointer;text-align:left;color:inherit;
      display:flex;flex-direction:column;
      box-shadow:0 30px 80px -40px rgba(0,0,0,.6);
      transition:
        transform 520ms var(--ease-cine),
        border-color 420ms var(--ease-out),
        box-shadow 520ms var(--ease-cine);
    }
    .admin-card:hover,
    .admin-card:focus-visible{
      transform:translateY(-6px);
      border-color:rgba(201,169,97,.38);
      box-shadow:
        0 48px 110px -40px rgba(0,0,0,.78),
        0 0 0 1px rgba(201,169,97,.22);
      outline:none;
    }

    .admin-card-img{
      position:relative;
      aspect-ratio:5/4;
      background:#0d1b30 center/cover no-repeat;
    }
    .admin-card-img::after{
      content:"";position:absolute;inset:auto 0 0 0;height:55%;
      background:linear-gradient(to top,
        rgba(10,22,40,.92) 0%,
        rgba(10,22,40,.55) 48%,
        transparent 100%);
      pointer-events:none;
    }
    /* Numéro de propriété gravé, en haut-gauche */
    .admin-card-no{
      position:absolute;top:16px;left:18px;z-index:2;
      font-family:var(--f-sans);font-size:10px;letter-spacing:.32em;
      text-transform:uppercase;color:rgba(245,237,224,.85);
    }
    /* Mini-titre qui remonte depuis l'image sur la carte — style cf-card */
    .admin-card-overlay{
      position:absolute;inset:auto 0 0 0;z-index:3;padding:18px 20px 18px;
    }
    .admin-card-title{
      font-family:var(--f-serif);font-weight:400;font-style:italic;
      font-size:clamp(22px,2vw,28px);line-height:1.08;
      color:#F5EDE0;margin:0 0 6px;
      text-shadow:0 2px 20px rgba(0,0,0,.55);
    }
    .admin-card-guest{
      font-family:var(--f-sans);font-size:10.5px;letter-spacing:.22em;
      text-transform:uppercase;color:rgba(245,237,224,.78);margin:0;
      display:flex;align-items:center;gap:10px;
    }
    .admin-card-guest::before{
      content:"";display:inline-block;width:20px;height:1px;background:#C9A961;flex:0 0 20px;
    }

    /* Corps bas : info pratique + CTA */
    .admin-card-body{
      padding:18px 20px 20px;
      display:flex;flex-direction:column;gap:10px;
    }
    .admin-card-row{
      display:flex;align-items:center;gap:10px;
      font-family:var(--f-sans);font-size:13px;
      color:rgba(245,237,224,.72);
    }
    .admin-card-row svg{flex:0 0 14px;color:#D4B77E;opacity:.85}

    .admin-card-cta{
      margin-top:4px;padding-top:14px;
      border-top:1px solid rgba(201,169,97,.12);
      display:flex;justify-content:space-between;align-items:center;gap:12px;
    }
    .admin-card-cta-label{
      font-family:var(--f-sans);font-size:11px;letter-spacing:.28em;
      text-transform:uppercase;color:#D4B77E;
      display:inline-flex;align-items:center;gap:8px;
    }
    .admin-card-cta-label svg{transition:transform .28s var(--ease-out)}
    .admin-card:hover .admin-card-cta-label svg{transform:translateX(4px)}
    .admin-card-dates{
      font-family:var(--f-mono);font-size:10.5px;letter-spacing:.04em;
      color:rgba(245,237,224,.5);
    }
    .admin-card-dates .arrow{color:#D4B77E;margin:0 4px}

    /* Pied de page / compteur discret */
    .admin-foot{
      display:flex;align-items:center;justify-content:space-between;
      padding-top:clamp(28px,4vw,44px);
      border-top:1px solid rgba(201,169,97,.18);
      font-family:var(--f-sans);font-size:11px;letter-spacing:.28em;
      text-transform:uppercase;color:rgba(245,237,224,.6);
    }

    /* Overlay de transition pendant l'impersonation */
    .admin-loading{
      position:fixed;inset:0;z-index:9999;
      background:rgba(10,22,40,.88);
      backdrop-filter:blur(12px) saturate(1.2);
      -webkit-backdrop-filter:blur(12px) saturate(1.2);
      display:none;align-items:center;justify-content:center;
      flex-direction:column;gap:20px;
    }
    .admin-loading.is-active{display:flex}
    .admin-loading-spinner{
      width:34px;height:34px;
      border:2px solid rgba(201,169,97,.22);
      border-top-color:#D4B77E;
      border-radius:50%;animation:adminSpin 0.8s linear infinite;
    }
    @keyframes adminSpin{to{transform:rotate(360deg)}}
    .admin-loading-text{
      font-family:var(--f-sans);font-size:11px;letter-spacing:.32em;
      color:#D4B77E;text-transform:uppercase;
    }

    @media (max-width:720px){
      .admin-topbar{margin-bottom:40px}
      .admin-head{margin-bottom:36px}
      .admin-grid{grid-template-columns:1fr;gap:18px}
      .admin-foot{flex-direction:column;align-items:flex-start;gap:18px}
    }
  </style>
</head>
<body class="admin-page">

  <div class="admin-shell">

    <!-- Top bar : brand + déconnexion + switcher de langue -->
    <header class="admin-topbar">
      <a href="index.html" class="brand-word" aria-label="Delfosse Properties">
        <span class="brand-mono">Delfosse</span>
        <span class="brand-sub">Properties</span>
      </a>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="lang-switch" role="group" aria-label="Langue" data-i18n-attr="aria-label" data-i18n-attr-key="espace.aria.lang">
          <button type="button" data-lang="fr" class="is-active">FR</button>
          <span class="lang-sep">·</span>
          <button type="button" data-lang="en">EN</button>
        </div>
        <button type="button" id="adminLogout" class="admin-foot-btn" aria-label="Se déconnecter" data-i18n-attr="aria-label" data-i18n-attr-key="admin.logout.aria" data-i18n="admin.logout">Déconnexion</button>
      </div>
    </header>

    <!-- Bandeau d'intro, cohérent avec .cf-head de la home -->
    <section class="admin-head">
      <p class="eyebrow">
        <span class="eyebrow-num">✻</span>
        <span data-i18n="admin.eyebrow">Administration · Tableau de bord</span>
      </p>
      <h1 class="admin-title" data-i18n="admin.title" data-i18n-html="true">Accédez à l'espace <em>de votre choix.</em></h1>
      <p class="admin-lede" data-i18n="admin.lede">
        Cliquez sur la carte de l'appartement pour ouvrir directement son espace privé voyageur.
      </p>
    </section>

    <!-- Grille des 7 espaces -->
    <main class="admin-grid" id="adminGrid" role="list" aria-label="Liste des espaces privés" data-i18n-attr="aria-label" data-i18n-attr-key="admin.aria.list"></main>

    <!-- Footer -->
    <footer class="admin-foot">
      <span id="adminFootCount">—</span>
      <span data-i18n="admin.secured">Connexion chiffrée · AES-256</span>
    </footer>
  </div>

  <!-- Overlay transition pendant le switch de session -->
  <div class="admin-loading" id="adminLoading" role="status" aria-hidden="true" aria-live="polite">
    <div class="admin-loading-spinner" aria-hidden="true"></div>
    <div class="admin-loading-text" id="adminLoadingText" data-i18n="admin.loading.default">Ouverture de l'espace…</div>
  </div>

  <script src="js/i18n.js?v=e4"></script>
  <script src="js/auth.js?v=e1"></script>
  <script>
    (function(){
      // Contrôle d'accès : seuls les comptes is_admin peuvent voir cette page.
      const u = DP.requireAuth('login.html');
      if (!u) return;
      if (!u.is_admin) { window.location.replace('espace.html'); return; }

      const grid    = document.getElementById('adminGrid');
      const loader  = document.getElementById('adminLoading');
      const lText   = document.getElementById('adminLoadingText');
      const countEl = document.getElementById('adminFootCount');

      const list = Array.isArray(u.users) ? u.users : [];

      // Helpers de traduction côté page admin
      function lang(){ return (window.DP_I18N && window.DP_I18N.lang) ? window.DP_I18N.lang() : 'fr'; }
      function t(key, fallback){
        if (window.DP_I18N && window.DP_I18N.t) {
          const v = window.DP_I18N.t(key);
          if (v && v !== key) return v;
        }
        return fallback;
      }

      function applyCountLabel(){
        const n = list.length;
        const singular = t('admin.foot.one', ' espace privé');
        const plural   = t('admin.foot.many', ' espaces privés');
        countEl.textContent = n + (n > 1 ? plural : singular);
      }
      applyCountLabel();

      // Escape texte injecté dans innerHTML (sécurité XSS)
      function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

      // Rendu des cartes (statique, grille éditoriale)
      list.forEach((usr) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'admin-card';
        card.setAttribute('role', 'listitem');
        const ariaOpenTpl = t('admin.card.aria', 'Ouvrir l\'espace {no} — {name}');
        card.setAttribute('aria-label', ariaOpenTpl.replace('{no}', usr.property_no || '').replace('{name}', usr.name || usr.login));
        card.dataset.propNo = usr.property_no || '';
        card.dataset.propName = usr.name || usr.login;

        card.innerHTML = `
          <div class="admin-card-img" style="background-image:url('${esc(usr.image)}')">
            <span class="admin-card-no">${esc(usr.property_no || '')}</span>
            <div class="admin-card-overlay">
              <h3 class="admin-card-title">${esc(usr.property || '')}</h3>
              <p class="admin-card-guest">${esc(usr.name || '')}</p>
            </div>
          </div>
          <div class="admin-card-body">
            <p class="admin-card-row">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>${esc(usr.location || '')}</span>
            </p>
            <div class="admin-card-cta">
              <span class="admin-card-dates">${esc(usr.dates_in || '')} <span class="arrow">→</span> ${esc(usr.dates_out || '')}</span>
              <span class="admin-card-cta-label" data-cta-text>${esc(t('admin.cta', 'Accéder'))}
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </span>
            </div>
          </div>
        `;

        card.addEventListener('click', async () => {
          const prefix = t('admin.opening', 'Ouverture — ');
          lText.textContent = prefix + (usr.property_no || usr.login);
          loader.classList.add('is-active');
          loader.setAttribute('aria-hidden', 'false');
          try {
            // Backup admin complet avant switch, pour le bouton "Retour dashboard"
            try { localStorage.setItem('dp_admin_backup', JSON.stringify(u)); } catch(_){}
            const res = await DP.login(usr.login, usr.password);
            if (!res.ok) {
              loader.classList.remove('is-active');
              loader.setAttribute('aria-hidden', 'true');
              alert(t('admin.err', 'Erreur :') + ' ' + res.error);
              return;
            }
            window.location.href = 'espace.html';
          } catch (err) {
            loader.classList.remove('is-active');
            loader.setAttribute('aria-hidden', 'true');
            alert(t('admin.errTech', 'Erreur technique :') + ' ' + (err && err.message ? err.message : t('admin.errRetry', 'réessayez.')));
          }
        });

        grid.appendChild(card);
      });

      // Ré-applique les libellés dynamiques (compteur, aria, CTA) au changement de langue
      function reapplyDynamic(){
        applyCountLabel();
        const ariaOpenTpl = t('admin.card.aria', 'Ouvrir l\'espace {no} — {name}');
        const ctaLabel = t('admin.cta', 'Accéder');
        document.querySelectorAll('.admin-card').forEach(c => {
          c.setAttribute('aria-label', ariaOpenTpl.replace('{no}', c.dataset.propNo || '').replace('{name}', c.dataset.propName || ''));
          const cta = c.querySelector('[data-cta-text]');
          if (cta) {
            // On remplace juste le premier nœud texte (garde l'SVG)
            const first = cta.firstChild;
            if (first && first.nodeType === 3) first.nodeValue = ctaLabel + ' ';
          }
        });
      }
      document.querySelectorAll('.lang-switch [data-lang]').forEach(btn => {
        btn.addEventListener('click', () => setTimeout(reapplyDynamic, 10));
      });

      // Déconnexion
      document.getElementById('adminLogout').addEventListener('click', () => {
        DP.logout();
        try { localStorage.removeItem('dp_admin_backup'); } catch(_){}
        window.location.replace('login.html');
      });
    })();
  </script>
</body>
</html>
