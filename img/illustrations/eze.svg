<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" stroke="#F5EDE0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <title>Èze village médiéval — perché sur la Méditerranée</title>

  <!-- Ciel etoile -->
  <circle cx="100" cy="40" r="1.2" fill="#F5EDE0" opacity=".5"/>
  <circle cx="280" cy="60" r="1" fill="#F5EDE0" opacity=".4"/>
  <circle cx="500" cy="40" r="1.3" fill="#F5EDE0" opacity=".5"/>
  <circle cx="680" cy="70" r="1" fill="#F5EDE0" opacity=".4"/>
  <circle cx="740" cy="30" r="1.2" fill="#F5EDE0" opacity=".5"/>

  <!-- Soleil couchant a droite -->
  <circle cx="650" cy="180" r="55" opacity=".4"/>
  <circle cx="650" cy="180" r="70" stroke-dasharray="3 6" opacity=".25"/>

  <!-- Mer (horizon) -->
  <line x1="0" y1="280" x2="800" y2="280" />
  <!-- Vagues -->
  <path d="M 0 310 Q 50 305 100 310 T 200 310 T 300 310 T 400 310 T 500 310 T 600 310 T 700 310 T 800 310" opacity=".4"/>
  <path d="M 0 345 Q 50 340 100 345 T 200 345 T 300 345 T 400 345 T 500 345 T 600 345 T 700 345 T 800 345" opacity=".3"/>
  <path d="M 0 385 Q 50 380 100 385 T 200 385 T 300 385 T 400 385 T 500 385 T 600 385 T 700 385 T 800 385" opacity=".22"/>

  <!-- Reflet -->
  <line x1="650" y1="285" x2="650" y2="450" stroke-dasharray="2 6" opacity=".4"/>
  <line x1="640" y1="320" x2="660" y2="320" opacity=".4"/>
  <line x1="635" y1="360" x2="665" y2="360" opacity=".3"/>
  <line x1="625" y1="400" x2="675" y2="400" opacity=".25"/>

  <!-- Village medieval Eze perche : silhouette -->
  <!-- Pic rocheux -->
  <path d="M 150 280 L 200 200 L 240 180 L 280 160 L 320 150 L 360 155 L 400 170 L 430 200 L 460 230 L 480 260 L 490 280 Z" fill="#F5EDE0" opacity=".05"/>
  <path d="M 150 280 L 200 200 L 240 180 L 280 160 L 320 150 L 360 155 L 400 170 L 430 200 L 460 230 L 480 260" />

  <!-- Maisons sur le rocher -->
  <!-- Maison 1 (bas du village) -->
  <path d="M 230 240 L 230 215 L 260 200 L 290 215 L 290 240" />
  <rect x="245" y="220" width="8" height="12" stroke-width="0.9"/>
  <rect x="270" y="220" width="8" height="12" stroke-width="0.9"/>
  <!-- Maison 2 -->
  <path d="M 290 240 L 290 200 L 320 185 L 350 200 L 350 240" />
  <rect x="305" y="205" width="8" height="12" stroke-width="0.9"/>
  <rect x="328" y="205" width="8" height="12" stroke-width="0.9"/>
  <rect x="305" y="222" width="8" height="12" stroke-width="0.9"/>
  <rect x="328" y="222" width="8" height="12" stroke-width="0.9"/>
  <!-- Maison 3 -->
  <path d="M 350 230 L 350 185 L 380 170 L 410 185 L 410 230" />
  <rect x="365" y="195" width="8" height="12" stroke-width="0.9"/>
  <rect x="388" y="195" width="8" height="12" stroke-width="0.9"/>
  <rect x="365" y="212" width="8" height="12" stroke-width="0.9"/>
  <rect x="388" y="212" width="8" height="12" stroke-width="0.9"/>

  <!-- Tour du village (point haut) -->
  <path d="M 290 200 L 290 145 L 280 145 L 280 130 L 310 120 L 340 130 L 340 145 L 330 145 L 330 200" />
  <!-- Creneaux -->
  <path d="M 280 130 L 285 125 L 285 130 M 290 130 L 295 125 L 295 130 M 300 130 L 305 125 L 305 130 M 310 130 L 315 125 L 315 130 M 320 130 L 325 125 L 325 130 M 330 130 L 335 125 L 335 130" />
  <!-- Fenetres tour -->
  <rect x="297" y="155" width="6" height="10" stroke-width="0.9"/>
  <rect x="315" y="155" width="6" height="10" stroke-width="0.9"/>
  <rect x="297" y="175" width="6" height="10" stroke-width="0.9"/>
  <rect x="315" y="175" width="6" height="10" stroke-width="0.9"/>

  <!-- Drapeau au sommet -->
  <line x1="310" y1="120" x2="310" y2="100" />
  <path d="M 310 100 L 328 105 L 310 112 Z" />

  <!-- Petites maisons additionnelles -->
  <path d="M 410 240 L 410 215 L 430 205 L 450 215 L 450 240" />
  <rect x="420" y="220" width="8" height="12" stroke-width="0.9"/>

  <!-- Chemin sinueux vers le village -->
  <path d="M 50 350 Q 100 340 130 320 Q 160 295 190 280" stroke-dasharray="2 4" opacity=".5"/>

  <!-- Cypres au pied -->
  <path d="M 100 290 Q 95 270 100 245 Q 105 270 100 290" fill="#F5EDE0" opacity=".1"/>
  <path d="M 100 290 Q 95 270 100 245 Q 105 270 100 290" />
  <line x1="100" y1="290" x2="100" y2="300" />

  <path d="M 470 280 Q 465 260 470 240 Q 475 260 470 280" fill="#F5EDE0" opacity=".1"/>
  <path d="M 470 280 Q 465 260 470 240 Q 475 260 470 280" />
  <line x1="470" y1="280" x2="470" y2="290" />

  <!-- Mouettes -->
  <path d="M 380 80 Q 385 74 390 80 Q 395 74 400 80" opacity=".5"/>
  <path d="M 530 110 Q 535 104 540 110 Q 545 104 550 110" opacity=".4"/>
  <path d="M 200 100 Q 205 94 210 100 Q 215 94 220 100" opacity=".4"/>

  <!-- Voilier au loin -->
  <line x1="730" y1="278" x2="730" y2="245" />
  <path d="M 730 245 L 730 273 L 755 273 Z" opacity=".5"/>
  <path d="M 720 280 L 740 280" />
</svg>
